<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<h1>🏛️ Panel Administrativo</h1>

<!-- ========================= -->
<!-- CREAR ASAMBLEA -->
<!-- ========================= -->
<h2>Crear Asamblea</h2>

<input id="assemblyName" placeholder="Nombre Asamblea">

<select id="assemblyType">
    <option value="diputados">Diputados</option>
    <option value="senadores">Senadores</option>
    <option value="municipal">Concejo Municipal</option>
</select>

<button onclick="createAssembly()">Crear</button>

<hr>

<h3>Asambleas</h3>
<ul id="assemblies"></ul>

<hr>

<!-- ========================= -->
<!-- CREAR MOCIÓN -->
<!-- ========================= -->
<h2>Crear Moción</h2>

<input id="motionTitle" placeholder="Título de la moción">
<button onclick="createMotion()">Crear</button>

<h3>Mociones</h3>
<ul id="motions"></ul>

<hr>

<!-- ========================= -->
<!-- CONTROL VOTACIÓN -->
<!-- ========================= -->
<h2>Control de Votación</h2>

<p><strong>Estado:</strong> <span id="status">-</span></p>

<button onclick="startMotion()">🟢 Iniciar Votación</button>
<button onclick="closeMotion()">🔴 Cerrar Votación</button>

<hr>

<!-- ========================= -->
<!-- RESULTADOS -->
<!-- ========================= -->
<h2>📊 Resultados</h2>

<p>YES: <span id="yes">0</span></p>
<p>NO: <span id="no">0</span></p>
<p>ABSTAIN: <span id="abstain">0</span></p>

<hr>

<!-- ========================= -->
<!-- GRUPOS / BLOQUES -->
<!-- ========================= -->
<h2>🏷️ Crear Grupo / Bloque</h2>

<input id="group-name" placeholder="Nombre (MAS, Zona Norte, Bloque A)">
    
<select id="group-type">
    <option value="partido">Partido</option>
    <option value="barrio">Barrio</option>
    <option value="bloque">Bloque</option>
    <option value="comision">Comisión</option>
</select>

<input id="group-color" type="color">

<button onclick="createGroup()">Crear Grupo</button>

<ul id="groups"></ul>

<hr>

<!-- ========================= -->
<!-- VOTAR (TEST ADMIN) -->
<!-- ========================= -->
<h2>🗳️ Votar (modo prueba)</h2>

<button onclick="vote('YES')">YES</button>
<button onclick="vote('NO')">NO</button>
<button onclick="vote('ABSTAIN')">ABSTAIN</button>

<!-- ========================= -->
<!-- SCRIPTS -->
<!-- ========================= -->
<script type="module" src="../assets/js/api.js"></script>
<script type="module" src="../assets/js/ws.js"></script>
<script type="module" src="../assets/js/admin.js"></script>

</body>
</html>
