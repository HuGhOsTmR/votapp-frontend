<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VotApp - Sesión en Vivo</title>

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/voting.css">
</head>

<body>

<h1>🗳️ VotApp - Sesión en Vivo</h1>

<div class="status">
    Estado: <span id="status">Esperando votación...</span>
</div>

<div class="vote-container">
    <button class="vote-btn yes" onclick="vote('YES')">✔ SÍ</button>
    <button class="vote-btn no" onclick="vote('NO')">✖ NO</button>
    <button class="vote-btn abstain" onclick="vote('ABSTAIN')">➖ ABSTENCIÓN</button>
</div>

<div class="results">
    <div class="card yes">
        <h2>YES</h2>
        <p id="yes">0</p>
    </div>
    <div class="card no">
        <h2>NO</h2>
        <p id="no">0</p>
    </div>
    <div class="card abstain">
        <h2>ABSTAIN</h2>
        <p id="abstain">0</p>
    </div>
</div>

<div id="log"></div>

<script src="assets/js/ws.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
